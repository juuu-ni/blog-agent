<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>블로그 글쓰기 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
          <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">블로그 에이전트</span>
      </div>
      <a href="/history" class="btn-back">저장된 글</a>
    </div>
  </header>

  <!-- 스텝 인디케이터 -->
  <div class="step-indicator-wrap">
    <div class="step-indicator">
      <div class="step active" id="ind-1">
        <div class="step-bubble">1</div>
        <span class="step-label">샘플 등록</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="ind-2">
        <div class="step-bubble">2</div>
        <span class="step-label">스타일 분석</span>
      </div>
      <div class="step-line"></div>
      <div class="step" id="ind-3">
        <div class="step-bubble">3</div>
        <span class="step-label">글 생성</span>
      </div>
    </div>
  </div>

  <main>

    <!-- 저장된 프로파일 -->
    <section class="card" id="saved-profiles-section" style="display:none;">
      <div class="card-header">
        <span class="saved-profiles-icon">📁</span>
        <h2>저장된 프로파일</h2>
      </div>
      <p class="card-desc">이전에 저장한 말투 프로파일을 불러올 수 있어요.</p>
      <div id="saved-profiles-list"></div>
    </section>

    <!-- Step 1: 샘플 등록 -->
    <section class="card" id="step-samples">
      <div class="card-header">
        <span class="step-badge">1</span>
        <h2>샘플 등록</h2>
      </div>
      <p class="card-desc">본인이 쓴 블로그 글을 붙여넣으세요. 분석 정확도를 위해 최소 3개를 권장합니다.</p>

      <div id="sample-list">
        <div class="sample-item">
          <div class="sample-item-header">
            <span class="sample-num">샘플 1</span>
            <button class="btn-remove" onclick="removeSample(this)" title="삭제">✕</button>
          </div>
          <textarea class="sample-textarea" placeholder="여기에 블로그 글을 붙여넣으세요..."></textarea>
        </div>
      </div>

      <button class="btn btn-outline" id="btn-add-sample" onclick="addSample()">+ 샘플 추가</button>

      <div class="card-footer-note">
        <span class="note-icon">💡</span> 다양한 주제의 글일수록 더 정확하게 학습해요
      </div>
    </section>

    <!-- Step 2: 스타일 분석 -->
    <section class="card" id="step-analyze">
      <div class="card-header">
        <span class="step-badge">2</span>
        <h2>스타일 분석</h2>
      </div>
      <p class="card-desc">등록한 샘플을 분석해 말투 프로파일을 추출합니다.</p>

      <button class="btn btn-primary" id="btn-analyze" onclick="analyzeStyle()">분석 시작</button>

      <div class="loading" id="loading-analyze" style="display:none;">
        <div class="spinner"></div>
        <span>말투를 분석하고 있어요...</span>
      </div>

      <div class="profile-result" id="profile-result" style="display:none;">
        <h3 class="profile-title">말투 프로파일</h3>
        <div class="profile-grid" id="profile-grid"></div>
        <div class="profile-save-row">
          <input type="text" class="text-input" id="profile-name-input" placeholder="프로파일 이름 (예: 내 말투, 친구 말투)" maxlength="20" />
          <button class="btn btn-outline" onclick="saveProfile()">저장</button>
        </div>
      </div>
    </section>

    <!-- Step 3: 글 생성 페이지로 이동 -->
    <div class="go-generate" id="go-generate" style="display:none;">
      <button class="btn btn-primary btn-go" onclick="goToGenerate()">
        글 생성하러 가기 →
      </button>
      <p class="go-generate-hint">분석된 말투 프로파일이 저장됐어요</p>
    </div>

  </main>

  <footer class="site-footer">
    <p>© 2025 블로그 글쓰기 에이전트 · Powered by Claude API</p>
  </footer>

  <script src="app.js"></script>
  <script src="auth-header.js"></script>
</body>
</html>

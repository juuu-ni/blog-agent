<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>저장된 글 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="history.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="/" class="logo-link">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
            <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">블로그 에이전트</span>
        </a>
      </div>
      <a href="/generate" class="btn-back">← 글 생성하기</a>
    </div>
  </header>

  <main>
    <div class="history-header">
      <h1 class="history-title">저장된 글</h1>
      <span class="history-count" id="post-count"></span>
    </div>

    <div id="search-bar" class="search-bar" style="display:none;">
      <div class="search-input-wrap">
        <input id="search-input" type="text" class="search-input" placeholder="제목, 장소로 검색..." autocomplete="off" />
        <button id="search-clear" class="search-clear" style="display:none;" aria-label="검색 초기화">✕</button>
      </div>
    </div>

    <div id="history-search-empty" class="history-empty" style="display:none;">
      <p>검색 결과가 없습니다.</p>
    </div>

    <div id="history-loading" class="history-loading">
      <div class="loading" style="margin-top:0; justify-content:center;">
        <div class="spinner"></div>
        <span>불러오는 중...</span>
      </div>
    </div>

    <div id="history-empty" class="history-empty" style="display:none;">
      <p>저장된 글이 없습니다.</p>
      <a href="/generate" class="btn btn-primary" style="margin-top:12px;">글 생성하러 가기</a>
    </div>

    <div id="history-grid" class="history-grid" style="display:none;"></div>
  </main>

  <footer class="site-footer">
    <p>© 2025 블로그 글쓰기 에이전트 · Powered by Claude API</p>
  </footer>

  <script src="history.js"></script>
  <script src="auth-header.js"></script>
</body>
</html>

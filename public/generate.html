<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>글 생성 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="generate.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="/" class="logo-link">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
            <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">블로그 에이전트</span>
        </a>
      </div>
      <div class="header-nav">
        <a href="/history" class="btn-back">저장된 글</a>
        <a href="/" class="btn-back">← 분석으로 돌아가기</a>
      </div>
    </div>
  </header>

  <!-- 스텝 인디케이터 -->
  <div class="step-indicator-wrap">
    <div class="step-indicator">
      <div class="step done" id="ind-1">
        <div class="step-bubble">✓</div>
        <span class="step-label">샘플 등록</span>
      </div>
      <div class="step-line done-line"></div>
      <div class="step done" id="ind-2">
        <div class="step-bubble">✓</div>
        <span class="step-label">스타일 분석</span>
      </div>
      <div class="step-line done-line"></div>
      <div class="step active" id="ind-3">
        <div class="step-bubble">3</div>
        <span class="step-label">글 생성</span>
      </div>
    </div>
  </div>

  <main>

    <!-- 프로파일 선택 -->
    <section class="card card-profile-summary" id="profile-summary">
      <div class="card-header">
        <span class="step-badge" id="profile-step-badge">2</span>
        <h2>말투 프로파일 선택</h2>
      </div>
      <div class="profile-select-row">
        <select id="profile-select" class="profile-select" onchange="onProfileSelect(this.value)">
          <option value="">불러오는 중...</option>
        </select>
        <a href="/" class="btn btn-outline btn-sm">새로 분석</a>
      </div>
      <div class="profile-grid" id="profile-grid" style="display:none; margin-top:14px;"></div>
    </section>

    <!-- 글 생성 -->
    <section class="card" id="step-generate">
      <div class="card-header">
        <span class="step-badge">3</span>
        <h2>글 생성</h2>
      </div>
      <p class="card-desc">어떤 주제로 글을 쓸까요? 학습된 말투로 블로그 글을 생성합니다.</p>

      <!-- 가게 정보 검색 -->
      <div class="place-search-section">
        <label class="place-search-label">가게 정보 <span class="optional-badge">선택</span></label>
        <div class="place-search-row">
          <input type="text" id="place-input" class="text-input" placeholder="예: 스타벅스 강남점" />
          <button class="btn btn-outline" id="btn-search-place" onclick="searchPlace()">검색</button>
        </div>
        <div id="place-search-results" class="place-search-results" style="display:none;"></div>
        <div id="place-selected" class="place-selected-info" style="display:none;"></div>
        <div id="map-image-preview" class="map-image-preview" style="display:none;"></div>
      </div>

      <!-- 템플릿 토글 -->
      <div class="template-toggle-row">
        <div class="template-toggle-left">
          <span class="template-toggle-label">맛집 리뷰 템플릿</span>
          <span class="template-toggle-hint">구조화된 맛집 리뷰를 자동 생성합니다</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="template-toggle" onchange="toggleTemplateMode()" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 일반 모드 -->
      <div id="mode-normal">
        <div class="photo-upload-section">
          <label class="photo-drop-zone" for="photo-input" id="photo-drop-zone">
            <span class="photo-drop-icon">📷</span>
            <span class="photo-drop-text">사진 추가 <span class="photo-drop-sub">(선택 · 여러 장 가능)</span></span>
          </label>
          <input type="file" id="photo-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
          <div class="photo-preview-grid" id="photo-preview-grid"></div>
        </div>

        <div class="input-row">
          <input type="text" id="topic-input" class="text-input" placeholder="예: 오늘 카페 다녀온 이야기" />
          <button class="btn btn-primary" id="btn-generate" onclick="generatePost()">글 생성</button>
        </div>

        <div class="must-include-section">
          <label class="must-include-label" for="must-include-input">꼭 들어갈 내용 <span class="optional-badge">선택</span></label>
          <textarea id="must-include-input" class="must-include-textarea" placeholder="예: 주차 가능, 웨이팅 30분, 가격 1인 15000원" rows="3"></textarea>
        </div>
      </div>

      <!-- 템플릿 모드 -->
      <div id="mode-template" style="display:none;">

        <!-- 헤더 -->
        <div class="tpl-section">
          <div class="tpl-section-title">헤더</div>
          <div class="tpl-fields">
            <div class="tpl-field">
              <label class="tpl-label">블로그 제목</label>
              <input type="text" id="tpl-blog-title" class="text-input" placeholder="예: [성수 데이트 맛집] 이태리국시 : 뜨끈한 돌솥 파스타" />
            </div>
            <div class="tpl-field">
              <label class="tpl-label">가게 이름 <span class="tpl-required">*</span></label>
              <input type="text" id="tpl-name" class="text-input" placeholder="가게명" />
            </div>
          </div>
        </div>

        <!-- 기본 정보 -->
        <div class="tpl-section">
          <div class="tpl-section-title">기본 정보</div>
          <div class="tpl-fields tpl-grid-2">
            <div class="tpl-field">
              <label class="tpl-label">위치</label>
              <input type="text" id="tpl-location" class="text-input" placeholder="서울 강남구..." />
            </div>
            <div class="tpl-field">
              <label class="tpl-label">인스타그램</label>
              <input type="text" id="tpl-instagram" class="text-input" placeholder="@cafe_name" />
            </div>
            <div class="tpl-field">
              <label class="tpl-label">전화번호</label>
              <input type="text" id="tpl-phone" class="text-input" placeholder="02-1234-5678" />
            </div>
            <div class="tpl-field">
              <label class="tpl-label">영업시간</label>
              <input type="text" id="tpl-hours" class="text-input" placeholder="11:00 ~ 22:00" />
            </div>
          </div>
        </div>

        <!-- 섹션 메모 -->
        <div class="tpl-section">
          <div class="tpl-section-title">섹션 메모 <span class="optional-badge">AI가 참고해서 작성</span></div>
          <div class="tpl-fields">
            <div class="tpl-field">
              <label class="tpl-label">메뉴 &amp; 가격</label>
              <textarea id="tpl-menu-prices" class="must-include-textarea" rows="2" placeholder="아메리카노 5,500원, 카페라떼 6,000원"></textarea>
            </div>
            <div class="tpl-field">
              <label class="tpl-label">꼭 들어갈 내용 <span class="optional-badge">선택</span></label>
              <textarea id="tpl-must-include" class="must-include-textarea" rows="2" placeholder="예: 주차 가능, 포장 안됨, 현금만 가능, 2인 이상 방문 추천"></textarea>
            </div>
          </div>
        </div>

        <!-- 섹션별 사진 -->
        <div class="tpl-section">
          <div class="tpl-section-title">섹션별 사진</div>
          <div class="tpl-photo-groups">
            <div class="tpl-photo-group">
              <div class="tpl-photo-label">🏠 외부 모습</div>
              <label class="photo-drop-zone photo-drop-sm" for="photo-exterior" id="drop-exterior">
                <span class="photo-drop-icon">📷</span>
                <span class="photo-drop-text">외부 사진 <span class="photo-drop-sub">(선택)</span></span>
              </label>
              <input type="file" id="photo-exterior" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
              <div class="photo-preview-grid" id="preview-exterior"></div>
            </div>
            <div class="tpl-photo-group">
              <div class="tpl-photo-label">🏪 내부 모습</div>
              <label class="photo-drop-zone photo-drop-sm" for="photo-interior" id="drop-interior">
                <span class="photo-drop-icon">📷</span>
                <span class="photo-drop-text">내부 사진 <span class="photo-drop-sub">(선택)</span></span>
              </label>
              <input type="file" id="photo-interior" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
              <div class="photo-preview-grid" id="preview-interior"></div>
            </div>
            <div class="tpl-photo-group">
              <div class="tpl-photo-label">🍽 디테일 컷</div>
              <label class="photo-drop-zone photo-drop-sm" for="photo-detail" id="drop-detail">
                <span class="photo-drop-icon">📷</span>
                <span class="photo-drop-text">디테일 컷 <span class="photo-drop-sub">(선택)</span></span>
              </label>
              <input type="file" id="photo-detail" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
              <div class="photo-preview-grid" id="preview-detail"></div>
            </div>
          </div>
        </div>

        <!-- 메뉴 별점 -->
        <div class="tpl-section">
          <div class="tpl-section-header">
            <div class="tpl-section-title" style="margin-bottom:0;">메뉴 별점</div>
            <button class="btn btn-outline btn-sm" onclick="addMenuRating()">+ 메뉴 추가</button>
          </div>
          <div id="menu-ratings-list" class="menu-ratings-list"></div>
        </div>

        <button class="btn btn-primary btn-generate-full" id="btn-generate-tpl" onclick="generatePost()">글 생성</button>
      </div>

      <div class="loading" id="loading-generate" style="display:none;">
        <div class="spinner"></div>
        <span id="loading-text">글을 쓰고 있어요...</span>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>© 2025 블로그 글쓰기 에이전트 · Powered by Claude API</p>
  </footer>

  <script src="generate.js"></script>
  <script src="auth-header.js"></script>
</body>
</html>

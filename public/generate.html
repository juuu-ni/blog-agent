<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>글 생성 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="/" class="logo-link">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
            <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">블로그 에이전트</span>
        </a>
      </div>
      <a href="/" class="btn-back">← 분석으로 돌아가기</a>
    </div>
  </header>

  <!-- 스텝 인디케이터 -->
  <div class="step-indicator-wrap">
    <div class="step-indicator">
      <div class="step done" id="ind-1">
        <div class="step-bubble">✓</div>
        <span class="step-label">샘플 등록</span>
      </div>
      <div class="step-line done-line"></div>
      <div class="step done" id="ind-2">
        <div class="step-bubble">✓</div>
        <span class="step-label">스타일 분석</span>
      </div>
      <div class="step-line done-line"></div>
      <div class="step active" id="ind-3">
        <div class="step-bubble">3</div>
        <span class="step-label">글 생성</span>
      </div>
    </div>
  </div>

  <main>

    <!-- 프로파일 요약 -->
    <section class="card card-profile-summary" id="profile-summary">
      <div class="card-header">
        <span class="step-badge" style="background:#e8faf0; color:#03C75A;">✓</span>
        <h2>분석된 말투 프로파일</h2>
      </div>
      <div class="profile-grid" id="profile-grid"></div>
    </section>

    <!-- 글 생성 -->
    <section class="card" id="step-generate">
      <div class="card-header">
        <span class="step-badge">3</span>
        <h2>글 생성</h2>
      </div>
      <p class="card-desc">어떤 주제로 글을 쓸까요? 학습된 말투로 블로그 글을 생성합니다.</p>

      <!-- 사진 업로드 -->
      <div class="photo-upload-section">
        <label class="photo-drop-zone" for="photo-input" id="photo-drop-zone">
          <span class="photo-drop-icon">📷</span>
          <span class="photo-drop-text">사진 추가 <span class="photo-drop-sub">(선택 · 여러 장 가능)</span></span>
        </label>
        <input type="file" id="photo-input" accept="image/jpeg,image/png,image/gif,image/webp" multiple hidden />
        <div class="photo-preview-grid" id="photo-preview-grid"></div>
      </div>

      <div class="input-row">
        <input
          type="text"
          id="topic-input"
          class="text-input"
          placeholder="예: 오늘 카페 다녀온 이야기"
        />
        <button class="btn btn-primary" id="btn-generate" onclick="generatePost()">글 생성</button>
      </div>

      <div class="loading" id="loading-generate" style="display:none;">
        <div class="spinner"></div>
        <span id="loading-text">글을 쓰고 있어요...</span>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>© 2025 블로그 글쓰기 에이전트 · Powered by Claude API</p>
  </footer>

  <script src="generate.js"></script>
</body>
</html>

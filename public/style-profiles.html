<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>말투 프로파일 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="style-profiles.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="/" class="logo-link">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
            <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">블로그 에이전트</span>
        </a>
      </div>
      <div class="header-nav">
        <a href="/history" class="btn-back">저장된 글</a>
        <a href="/" class="btn-back">← 분석으로 돌아가기</a>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1 class="page-title">말투 프로파일</h1>
      <p class="page-desc">저장된 말투 프로파일을 관리하고 수정하세요.</p>
    </div>

    <div id="profiles-loading" class="loading">
      <div class="spinner"></div>
      <span>불러오는 중...</span>
    </div>

    <div id="profiles-empty" class="empty-state" style="display:none;">
      <p class="empty-text">저장된 말투 프로파일이 없습니다.</p>
      <a href="/" class="btn btn-primary">샘플 분석하러 가기</a>
    </div>

    <div id="profiles-list"></div>
  </main>

  <footer class="site-footer">
    <p>© 2025 블로그 글쓰기 에이전트 · Powered by Claude API</p>
  </footer>

  <script src="style-profiles.js"></script>
  <script src="auth-header.js"></script>
</body>
</html>

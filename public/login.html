<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>로그인 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <main class="auth-main">

    <div class="auth-brand">
      <svg class="auth-brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
        <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="auth-brand-name">블로그 에이전트</span>
    </div>

    <div class="auth-card">

      <!-- 탭 -->
      <div class="auth-tabs" id="auth-tabs-el">
        <button class="auth-tab" id="tab-login">LOG IN</button>
        <button class="auth-tab" id="tab-signup">SIGN UP</button>
        <div class="auth-tab-indicator" id="tab-indicator"></div>
      </div>

      <!-- 로그인 폼 -->
      <div id="panel-login">
        <div id="login-error" class="auth-msg auth-msg-error" style="display:none;"></div>
        <form id="form-login" class="auth-form">
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="login-email" class="auth-input" placeholder="이메일" autocomplete="email" required />
          </div>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="login-password" class="auth-input" placeholder="비밀번호" autocomplete="current-password" required />
          </div>
          <button type="submit" class="auth-submit" id="btn-login-submit">SUBMIT</button>
        </form>
        <div style="text-align:center; margin-top: 12px;">
          <button type="button" id="btn-forgot" style="background:none; border:none; font-size:12px; color:#a0a0a0; cursor:pointer; font-family:var(--font); text-decoration:underline; padding:0;">비밀번호를 잊으셨나요?</button>
        </div>
        <div class="auth-sep"><span>또는</span></div>
        <a href="/auth/kakao" class="btn-kakao">
          <svg class="kakao-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C6.48 3 2 6.58 2 11c0 2.84 1.76 5.33 4.4 6.84l-.9 3.33a.3.3 0 0 0 .45.33L9.8 18.9A11.7 11.7 0 0 0 12 19c5.52 0 10-3.58 10-8s-4.48-8-10-8z" fill="#191600"/>
          </svg>
          카카오로 계속하기
        </a>
      </div>

      <!-- 비밀번호 찾기 패널 -->
      <div id="panel-forgot" style="display:none;">
        <button type="button" id="btn-forgot-back" style="background:none; border:none; font-size:12px; color:#a0a0a0; cursor:pointer; font-family:var(--font); padding:0 0 20px; display:flex; align-items:center; gap:4px;">
          ← 로그인으로 돌아가기
        </button>
        <div id="forgot-error" class="auth-msg auth-msg-error" style="display:none;"></div>
        <div id="forgot-success" class="auth-msg auth-msg-success" style="display:none;">
          이메일을 보냈습니다. 받은 편지함을 확인해 주세요.
        </div>
        <form id="form-forgot" class="auth-form">
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="forgot-email" class="auth-input" placeholder="가입한 이메일" autocomplete="email" required />
          </div>
          <button type="submit" class="auth-submit" id="btn-forgot-submit">재설정 이메일 보내기</button>
        </form>
      </div>

      <!-- 회원가입 폼 -->
      <div id="panel-signup" style="display:none;">
        <div id="signup-error" class="auth-msg auth-msg-error" style="display:none;"></div>
        <div id="signup-success" class="auth-msg auth-msg-success" style="display:none;">
          확인 이메일을 보냈습니다. 이메일을 확인해 주세요.
        </div>
        <form id="form-signup" class="auth-form">
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input type="email" id="signup-email" class="auth-input" placeholder="이메일" autocomplete="email" required />
          </div>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="signup-password" class="auth-input" placeholder="비밀번호 (6자 이상)" autocomplete="new-password" required />
          </div>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="signup-confirm" class="auth-input" placeholder="비밀번호 확인" autocomplete="new-password" required />
          </div>
          <button type="submit" class="auth-submit" id="btn-signup-submit">SUBMIT</button>
        </form>
        <div class="auth-sep"><span>또는</span></div>
        <a href="/auth/kakao" class="btn-kakao">
          <svg class="kakao-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3C6.48 3 2 6.58 2 11c0 2.84 1.76 5.33 4.4 6.84l-.9 3.33a.3.3 0 0 0 .45.33L9.8 18.9A11.7 11.7 0 0 0 12 19c5.52 0 10-3.58 10-8s-4.48-8-10-8z" fill="#191600"/>
          </svg>
          카카오로 계속하기
        </a>
      </div>

    </div>
  </main>

<script src="/login.js"></script>
</body>
</html>

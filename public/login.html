<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
          <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">블로그 에이전트</span>
      </div>
    </div>
  </header>

  <main class="login-main">
    <div class="login-card card">
      <div class="login-logo-wrap">
        <svg class="login-logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
          <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <h1 class="login-title">블로그 에이전트</h1>
        <p class="login-desc">내 말투로 블로그 글을 써주는 AI 에이전트</p>
      </div>

      <div id="login-error" class="login-error" style="display:none;">
        로그인 중 오류가 발생했습니다. 다시 시도해 주세요.
      </div>

      <a href="/auth/kakao" class="btn-kakao">
        <svg class="kakao-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3C6.48 3 2 6.58 2 11c0 2.84 1.76 5.33 4.4 6.84l-.9 3.33a.3.3 0 0 0 .45.33L9.8 18.9A11.7 11.7 0 0 0 12 19c5.52 0 10-3.58 10-8s-4.48-8-10-8z" fill="#191600"/>
        </svg>
        카카오 로그인
      </a>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2025 블로그 글쓰기 에이전트 · Powered by Claude API</p>
  </footer>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('login-error').style.display = 'block';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>비밀번호 재설정 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/login.css" />
</head>
<body>

  <main class="auth-main">

    <div class="auth-brand">
      <svg class="auth-brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
        <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span class="auth-brand-name">블로그 에이전트</span>
    </div>

    <div class="auth-card">
      <div class="auth-tabs" style="border-bottom: none; margin-bottom: 24px;">
        <span style="font-size:13px; font-weight:700; letter-spacing:1px; color: var(--color-text);">비밀번호 재설정</span>
      </div>

      <div id="reset-error" class="auth-msg auth-msg-error" style="display:none;"></div>
      <div id="reset-success" class="auth-msg auth-msg-success" style="display:none;">
        비밀번호가 변경되었습니다. 로그인 페이지로 이동합니다...
      </div>

      <form id="form-reset" class="auth-form">
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="reset-password" class="auth-input" placeholder="새 비밀번호 (6자 이상)" autocomplete="new-password" required />
        </div>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="reset-confirm" class="auth-input" placeholder="비밀번호 확인" autocomplete="new-password" required />
        </div>
        <button type="submit" class="auth-submit" id="btn-reset-submit">변경하기</button>
      </form>
      <p class="auth-switch">로그인 페이지로 <a href="/login">돌아가기</a></p>
    </div>

  </main>

<script src="/reset-password.js"></script>
</body>
</html>

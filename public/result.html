<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>생성된 글 · 블로그 에이전트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 헤더 -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <a href="/" class="logo-link">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="#03C75A"/>
            <path d="M8 12h8M8 8h5M8 16h6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">블로그 에이전트</span>
        </a>
      </div>
      <a href="/generate" class="btn-back">← 글 생성으로 돌아가기</a>
    </div>
  </header>

  <main>
    <div class="result-page-header">
      <h1 class="result-page-title" id="result-topic"></h1>
      <div class="result-actions">
        <button class="btn btn-outline" onclick="regenerate()">다시 생성하기</button>
        <button class="btn btn-primary" onclick="copyAll()">전체 복사</button>
      </div>
    </div>

    <!-- 인터리빙 / 단일 글 출력 -->
    <div id="result-body"></div>

    <!-- 하단 액션 -->
    <div class="result-bottom-actions">
      <button class="btn btn-outline" onclick="regenerate()">다시 생성하기</button>
      <button class="btn btn-primary" onclick="copyAll()" id="btn-copy-bottom">전체 복사</button>
    </div>
  </main>

  <footer class="site-footer">
    <p>© 2025 블로그 글쓰기 에이전트 · Powered by Claude API</p>
  </footer>

  <script src="result.js"></script>
</body>
</html>
